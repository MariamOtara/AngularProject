<form action="" #loginForm="ngForm" (ngSubmit)="login(loginForm)">
    <input type="email" name="email" id="" placeholder="Email" [(ngModel)]="email"  required email>
    <input type="password" name="password" id="" placeholder="Password" [(ngModel)]="password" required minlength="6">
    <button type="submit" [disabled]="loginForm.invalid">Sign In</button>
    
</form>
 <p (click)="forgotpassword()">Forgot Password</p>

<a routerLink="/signin">Don't have an account?</a>
